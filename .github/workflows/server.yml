name: Test Shithead Server

on:
  push:
    branches: [ "main" ]
    # paths: ["server/**"]
  pull_request:
    branches: [ "main" ]
    # paths: ["server/**"]
  
jobs:
  tests:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        # os: ["ubuntu-latest", "macos-latest", "windows-latest"] windows test fail on poetry install due to caching
        os: ["ubuntu-latest", "macos-latest"] 
        python-version: ["3.11"] 
    defaults:
      run:
        working-directory: ./server
        shell: bash
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "poetry"
        cache-dependency-path: server/poetry.lock

    - uses: snok/install-poetry@v1
      with:
        version: 1.8.5
        virtualenvs-create: true

    - run: poetry install --no-interaction

    - run: poetry run python -m pytest --junitxml=junit/test-results-${{ matrix.python-version }}-${{ matrix.os }}.xml --cov

    - name: Upload pytest test results
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results-${{ matrix.python-version }}-${{ matrix.os }}
        path: server/junit/test-results-${{ matrix.python-version }}-${{ matrix.os }}.xml
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}
